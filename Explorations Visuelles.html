<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calisthenics 12S — Explorations visuelles</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800;900&family=Space+Mono:wght@400;700&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400;1,6..72,500&family=Bricolage+Grotesque:wght@500;600;700;800&family=Spline+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;}
  /* ════════ STRUCTURE COMMUNE D'UN ÉCRAN TÉLÉPHONE ════════ */
  .scr{width:300px;height:650px;overflow:hidden;position:relative;display:flex;flex-direction:column;font-synthesis:none;-webkit-font-smoothing:antialiased;}
  .scr *{box-sizing:border-box;margin:0;}
  .sb{height:38px;display:flex;align-items:center;justify-content:space-between;padding:0 20px 0;font-size:12px;font-weight:700;flex-shrink:0;}
  .sb .dots{display:flex;gap:4px;align-items:center;}
  .body{flex:1;overflow:hidden;display:flex;flex-direction:column;}
  .pad{padding:0 18px;}
  .row{display:flex;align-items:center;}
  .col{display:flex;flex-direction:column;}
  .grow{flex:1;min-width:0;}
  .chips{display:flex;gap:6px;flex-wrap:wrap;}

  /* ═══════════════════════════════════════════════════════════
     DIRECTION A — BRUT (brutalist athlétique)
     Noir dur · lime électrique · Archivo + Space Mono · angles vifs
  ═══════════════════════════════════════════════════════════ */
  .b{background:var(--bg);color:var(--txt);font-family:'Archivo',sans-serif;
     --bg:#0B0B0B;--surf:#161616;--surf2:#1C1C1C;--line:#2C2C2C;--txt:#fff;--txt2:#C8C8C8;--dim:#7A7A7A;--dim2:#5A5A5A;
     --acc:#D8FF3A;--onAcc:#0B0B0B;--ink:#0B0B0B;--onInk:#D8FF3A;--acc2:#D8FF3A;}
  /* A × B — structure brutaliste, palette papier/terracotta/sauge */
  .bx{--bg:#E7DECE;--surf:#F1E9DB;--surf2:#EADFCD;--line:#CBBDA6;--txt:#2A241E;--txt2:#5C5346;--dim:#8A7E6E;--dim2:#AE9F8B;
      --acc:#BD5B36;--onAcc:#F6EFE3;--ink:#2A241E;--onInk:#F1E0CE;--acc2:#6E7E60;}
  .b .mono{font-family:'Space Mono',monospace;text-transform:uppercase;letter-spacing:1.5px;}
  .b .ey{font-family:'Space Mono',monospace;font-size:9.5px;letter-spacing:2px;text-transform:uppercase;color:var(--dim);}
  .b-bell{width:38px;height:38px;border:1.5px solid var(--line);display:grid;place-items:center;position:relative;color:var(--txt);}
  .b-bell::after{content:'';position:absolute;top:-4px;right:-4px;width:14px;height:14px;background:var(--acc);}
  .b-streak{border:1.5px solid var(--acc);color:var(--acc);font-family:'Space Mono',monospace;font-weight:700;font-size:13px;padding:8px 10px;}
  .b-today{background:var(--acc);color:var(--onAcc);padding:18px;margin:0 0 2px;}
  .b-today .t{font-size:36px;font-weight:900;line-height:.9;letter-spacing:-1.5px;text-transform:uppercase;}
  .b-chip{border:1.5px solid var(--onAcc);color:var(--onAcc);font-family:'Space Mono',monospace;font-size:9.5px;font-weight:700;padding:4px 8px;text-transform:uppercase;letter-spacing:1px;}
  .b-cta{background:var(--ink);color:var(--onInk);font-family:'Space Mono',monospace;font-weight:700;font-size:13px;padding:14px;text-align:center;width:100%;border:none;text-transform:uppercase;letter-spacing:2px;cursor:pointer;}
  .b-cell{border:1.5px solid var(--line);padding:13px;}
  .b-cell .n{font-size:30px;font-weight:900;letter-spacing:-1px;line-height:1;}
  .b-bar{height:8px;background:var(--surf2);border:1.5px solid var(--line);}
  .b-bar i{display:block;height:100%;background:var(--acc);}
  .b-ex{border:1.5px solid var(--line);padding:13px;}
  .b-set{width:34px;height:34px;border:1.5px solid var(--line);display:grid;place-items:center;font-family:'Space Mono',monospace;font-size:12px;font-weight:700;}
  .b-set.on{background:var(--acc);color:var(--onAcc);border-color:var(--acc);}
  .b-nav{display:flex;border-top:1.5px solid var(--line);background:var(--bg);flex-shrink:0;}
  .b-nav div{flex:1;text-align:center;padding:11px 0;font-family:'Space Mono',monospace;font-size:8.5px;letter-spacing:1px;text-transform:uppercase;color:var(--dim2);}
  .b-nav div.on{color:var(--acc);}

  /* ═══════════════════════════════════════════════════════════
     DIRECTION B — EDITORIAL (wellness premium)
     Papier chaud · serif Newsreader · terracotta + sauge · aéré
  ═══════════════════════════════════════════════════════════ */
  .e{background:#F3EEE4;color:#2A241E;font-family:'Spline Sans',sans-serif;}
  .e .sb{color:#2A241E;}
  .e .serif{font-family:'Newsreader',serif;font-weight:500;letter-spacing:-.3px;}
  .e .ey{font-family:'Newsreader',serif;font-style:italic;font-size:14px;color:#BD5B36;}
  .e-card{background:#FBF8F2;border:1px solid #E6DDCD;border-radius:22px;}
  .e-bell{width:40px;height:40px;border-radius:50%;background:#FBF8F2;border:1px solid #E6DDCD;display:grid;place-items:center;position:relative;}
  .e-bell::after{content:'';position:absolute;top:6px;right:7px;width:8px;height:8px;border-radius:50%;background:#BD5B36;}
  .e-streak{background:#BD5B36;color:#FBF8F2;border-radius:999px;font-weight:600;font-size:13px;padding:9px 14px;display:flex;gap:5px;align-items:center;}
  .e-today{background:#2F2A23;color:#F3EEE4;border-radius:26px;padding:22px;overflow:hidden;position:relative;}
  .e-today .t{font-family:'Newsreader',serif;font-size:30px;line-height:1.05;letter-spacing:-.5px;font-weight:500;}
  .e-chip{border:1px solid rgba(243,238,228,.4);border-radius:999px;font-size:10.5px;padding:5px 11px;color:#F3EEE4;}
  .e-cta{background:#BD5B36;color:#FBF8F2;border-radius:999px;font-weight:600;font-size:14px;padding:14px;width:100%;border:none;text-align:center;cursor:pointer;}
  .e-ring{width:64px;height:64px;border-radius:50%;border:3px solid #E6DDCD;display:grid;place-items:center;position:relative;}
  .e-pill{background:#EDE4D4;border-radius:999px;font-size:11px;padding:5px 11px;color:#7A6E5C;font-weight:600;}
  .e-ex{background:#FBF8F2;border:1px solid #E6DDCD;border-radius:18px;padding:15px;}
  .e-dot{width:30px;height:30px;border-radius:50%;background:#EDE4D4;display:grid;place-items:center;font-family:'Newsreader',serif;font-size:14px;color:#BD5B36;}
  .e-nav{display:flex;justify-content:space-around;background:#FBF8F2;border-top:1px solid #E6DDCD;padding:12px 0 14px;flex-shrink:0;}
  .e-nav div{font-size:10px;color:#A89A86;display:flex;flex-direction:column;align-items:center;gap:4px;}
  .e-nav div.on{color:#BD5B36;}
  .e-nav i{width:6px;height:6px;border-radius:50%;background:currentColor;display:block;}

  /* ═══════════════════════════════════════════════════════════
     DIRECTION C — POP (énergique, color-blocking)
     Crème · cobalt + corail + jaune · Bricolage Grotesque · gros chiffres
  ═══════════════════════════════════════════════════════════ */
  .p{background:#FCFAF4;color:#15141A;font-family:'Spline Sans',sans-serif;}
  .p .sb{color:#15141A;}
  .p .disp{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;letter-spacing:-1px;}
  .p .ey{font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:#15141A;}
  .p-bell{width:42px;height:42px;border-radius:14px;background:#15141A;display:grid;place-items:center;position:relative;color:#fff;}
  .p-bell::after{content:'';position:absolute;top:-3px;right:-3px;width:16px;height:16px;border-radius:50%;background:#FF5A45;border:2.5px solid #FCFAF4;}
  .p-streak{background:#FFCB2E;color:#15141A;border-radius:14px;font-weight:800;font-size:14px;padding:9px 13px;display:flex;gap:5px;align-items:center;font-family:'Bricolage Grotesque',sans-serif;}
  .p-today{background:#2438E0;color:#fff;border-radius:24px;padding:20px;overflow:hidden;position:relative;}
  .p-today .t{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:30px;line-height:.98;letter-spacing:-1px;}
  .p-blob{position:absolute;border-radius:50%;}
  .p-chip{background:rgba(255,255,255,.22);border-radius:999px;font-size:11px;font-weight:600;padding:5px 11px;color:#fff;}
  .p-cta{background:#FFCB2E;color:#15141A;border-radius:16px;font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:15px;padding:15px;width:100%;border:none;text-align:center;cursor:pointer;}
  .p-card{border-radius:20px;padding:16px;}
  .p-card .n{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:34px;letter-spacing:-1.5px;line-height:1;}
  .p-bar{height:10px;border-radius:999px;background:#EDE9DE;overflow:hidden;}
  .p-bar i{display:block;height:100%;border-radius:999px;}
  .p-ex{border:2px solid #15141A;border-radius:18px;padding:15px;}
  .p-set{width:36px;height:36px;border-radius:11px;border:2px solid #15141A;display:grid;place-items:center;font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:14px;}
  .p-set.on{background:#22A06B;border-color:#22A06B;color:#fff;}
  .p-nav{display:flex;justify-content:space-around;background:#fff;border-top:2px solid #15141A;padding:11px 0 13px;flex-shrink:0;}
  .p-nav div{font-size:10px;font-weight:700;color:#A8A2B0;display:flex;flex-direction:column;align-items:center;gap:4px;}
  .p-nav div.on{color:#2438E0;}
  .p-nav i{width:7px;height:7px;border-radius:3px;background:currentColor;display:block;}

  /* notif feed shared bits */
  .nf-item{display:flex;gap:11px;padding:12px;}
  .nf-ic{width:38px;height:38px;flex-shrink:0;display:grid;place-items:center;font-size:18px;}
  .tog{width:42px;height:25px;border-radius:20px;position:relative;flex-shrink:0;}
  .tog i{position:absolute;top:2.5px;width:20px;height:20px;border-radius:50%;background:#fff;box-shadow:0 1px 2px rgba(0,0,0,.3);}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="exploration.jsx"></script>
<script type="text/babel">
  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(<Exploration/>);
</script>
</body>
</html>
